name: Release Build

on:
  push:
    tags:
      - 'v*'     # v0.1.0-beta, v1.0.0 등 v로 시작하는 태그

permissions:
  contents: write  # GitHub Release 생성 권한

jobs:
  # ── Mac 빌드 ──────────────────────────────────────────────────────
  build-mac:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: uv 설치
        uses: astral-sh/setup-uv@v4

      - name: ffmpeg 설치
        run: brew install ffmpeg

      - name: 의존성 설치
        run: |
          uv sync --frozen
          uv pip install pyinstaller

      - name: Whisper 모델 다운로드 (base, ~142MB)
        run: uv run python -c "import whisper; whisper.load_model('base')"

      - name: PyInstaller 빌드
        run: uv run pyinstaller lms-summarizer.spec

      - name: ZIP 패키징
        run: |
          TAG="${{ github.ref_name }}"
          cd dist
          zip -qr "LMS-Summarizer-${TAG}-mac.zip" "LMS-Summarizer.app"
          echo "ZIP_NAME=LMS-Summarizer-${TAG}-mac.zip" >> $GITHUB_ENV

      - name: 빌드 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/${{ env.ZIP_NAME }}
          retention-days: 7

  # ── Windows 빌드 ──────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: uv 설치
        uses: astral-sh/setup-uv@v4

      - name: ffmpeg 설치
        run: choco install ffmpeg -y

      - name: 의존성 설치
        run: |
          uv sync --frozen
          uv pip install pyinstaller

      - name: Whisper 모델 다운로드 (base, ~142MB)
        run: uv run python -c "import whisper; whisper.load_model('base')"

      - name: PyInstaller 빌드
        run: uv run pyinstaller lms-summarizer.spec

      - name: ZIP 패키징
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "LMS-Summarizer-${tag}-windows.zip"
          Compress-Archive -Path "dist\LMS-Summarizer" -DestinationPath "dist\$zipName" -Force
          echo "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: 빌드 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/${{ env.ZIP_NAME }}
          retention-days: 7

  # ── GitHub Release 생성 ──────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Mac 빌드 다운로드
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts/

      - name: Windows 빌드 다운로드
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/

      - name: GitHub Release 생성 및 파일 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LMS Summarizer ${{ github.ref_name }}
          body: |
            # 🎓 LMS 강의 자동 요약기 ${{ github.ref_name }}

            숭실대학교 LMS 강의 영상을 자동으로 다운로드하고 AI가 요약해주는 프로그램입니다.

            ---

            ## 📥 설치 방법

            아래에서 운영체제에 맞는 파일을 다운로드하세요.

            | 운영체제 | 다운로드 파일 |
            |---------|-------------|
            | **Mac** (Apple Silicon / Intel) | `LMS-Summarizer-*-mac.zip` |
            | **Windows** (64비트) | `LMS-Summarizer-*-windows.zip` |

            1. 위 파일을 다운로드합니다
            2. 압축을 해제합니다
            3. 프로그램을 실행합니다

            ---

            ## ⚠️ 처음 실행 시 주의사항

            ### Mac 사용자
            "확인되지 않은 개발자" 경고가 뜨는 경우, 터미널에서 아래 명령어를 실행하세요:
            ```
            xattr -rd com.apple.quarantine LMS-Summarizer.app
            ```
            또는: **시스템 설정 → 개인 정보 보호 및 보안 → "확인 없이 열기"** 클릭

            ### 공통
            - **Google Chrome**이 설치되어 있어야 합니다
            - **Gemini API 키**가 필요합니다 (무료 발급 → https://aistudio.google.com/app/apikey)

            ---

            ## 🔑 Gemini API 키 무료 발급

            1. https://aistudio.google.com/app/apikey 접속
            2. Google 계정으로 로그인
            3. "**Create API key**" 클릭
            4. 생성된 키(`AIzaSy...`)를 프로그램에 입력

            ---

            ## 📖 자세한 사용법

            [README.md](https://github.com/Leonamin/lms-summarizer#readme) 를 참고하세요.
          files: artifacts/*
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          draft: false
